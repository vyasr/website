# GitHub Actions: Build Hugo site and deploy to Bluehost via rsync
#
# Required GitHub Repository Secrets:
#
#   SSH_PRIVATE_KEY   - Private key for SSH access to the deploy server.
#                       Generate a dedicated deploy key pair:
#                         ssh-keygen -t ed25519 -C "github-actions-deploy" -f deploy_key
#                       Add the PUBLIC key (deploy_key.pub) to the server's
#                       ~/.ssh/authorized_keys file.
#                       Paste the PRIVATE key (deploy_key) content into this secret.
#
#   DEPLOY_HOST       - SSH host address (e.g. 129.121.65.158)
#
#   DEPLOY_USER       - SSH username (e.g. wkngyomy)
#
#   DEPLOY_PATH       - Absolute path to the website document root on the server.
#                       MUST include a trailing slash.
#                       Example: /home/wkngyomy/public_html/website_8a95d627/
#                       WARNING: rsync will sync INTO this directory. Ensure this
#                       is the correct path — files outside it are never touched.
#

name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      content_file:
        description: "Path to content file to post (e.g. content/blog/my-post/index.md)"
        required: false
        default: ""
        type: string

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  HUGO_VERSION: "0.155.2"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78  # v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build
        run: hugo --minify

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='.htaccess' \
            --exclude='.well-known' \
            --exclude='files/cv.pdf' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            public/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}

  linkedin-post:
    runs-on: ubuntu-latest
    needs: [build-and-deploy]
    if: needs.build-and-deploy.result == 'success'
    env:
      LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
      LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Post new blog content to LinkedIn
        run: |
          # Handle first push (no parent commit)
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git diff-tree --no-commit-id -r --name-only HEAD | grep '^content/blog/' || true)
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.content_file }}" ]; then
            CHANGED_FILES="${{ inputs.content_file }}"
          else
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^content/blog/' || true)
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "No blog content changes detected."
            exit 0
          fi

          POSTED=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue
            echo "Processing: $file"
            python scripts/post_to_linkedin.py \
              --content-file "$file" \
              --state-file .linkedin_state.json
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 0 ]; then
              POSTED=$((POSTED + 1))
            elif [ $EXIT_CODE -eq 1 ]; then
              echo "ERROR: LinkedIn token expired. Update LINKEDIN_ACCESS_TOKEN secret."
              exit 1
            fi
          done <<< "$CHANGED_FILES"

          echo "Processed $POSTED file(s)."

      - name: Commit updated LinkedIn state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .linkedin_state.json
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update linkedin state [skip ci]"
            git push
          fi
