summary:
  text: I am a PhD candidate at the University of Michigan, Ann Arbor. I use 
    molecular simulations and machine learning methods to study the 
    self-assembly of proteins and nanoparticles into complex structures. I am 
    most interested in using machine learning methods to inform and advance 
    physics-based modeling of complex systems. I am the lead developer of a 
    number of open-source projects in my research area and have contributed to 
    numerous other well-known tools like SciPy.
