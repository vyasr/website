<header class="site-header">
  <div class="container header-inner">
    <div class="site-branding">
      <a class="site-title" href="/">{{ site.Title }}</a>
    </div>
    <nav class="site-nav" aria-label="Main">
      <ul class="nav-list">
        {{ range site.Menus.main }}
          {{ if .HasChildren }}
            <li class="nav-item has-children">
              <a class="nav-link" href="{{ .URL }}">{{ .Name }}</a>
              <ul class="nav-submenu">
                {{ range .Children }}
                  <li class="nav-subitem">
                    <a class="nav-sublink" href="{{ .URL }}">{{ .Name }}</a>
                  </li>
                {{ end }}
              </ul>
            </li>
          {{ else }}
            <li class="nav-item">
              <a class="nav-link" href="{{ .URL }}">{{ .Name }}</a>
            </li>
          {{ end }}
        {{ end }}
        <li class="nav-item nav-icon">
          <a class="nav-link" href="mailto:{{ site.Params.email }}" aria-label="Email">
            <img src="/icons/mail-36x36.png" alt="Email" />
          </a>
        </li>
        <li class="nav-item nav-icon">
          <a class="nav-link" href="{{ site.Params.github }}" target="_blank" rel="noopener" aria-label="GitHub">
            <img src="/icons/github-1-36x36.png" alt="GitHub" />
          </a>
        </li>
        <li class="nav-item nav-icon">
          <a class="nav-link" href="{{ site.Params.linkedin }}" target="_blank" rel="noopener" aria-label="LinkedIn">
            <img src="/icons/linkedin-36x36.png" alt="LinkedIn" />
          </a>
        </li>
        <li class="nav-item nav-icon">
          <a class="nav-link" href="{{ site.Params.scholar }}" target="_blank" rel="noopener" aria-label="Google Scholar">
            <img src="/icons/gscholar1-36x36.png" alt="Google Scholar" />
          </a>
        </li>
      </ul>
    </nav>
  </div>
</header>
