<header class="site-header">
  <div class="container header-inner">
    <div class="site-branding">
      <a class="site-title" href="/">{{ site.Title }}</a>
    </div>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" aria-label="Toggle navigation">
      <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
        <rect x="3" y="6" width="18" height="2"></rect>
        <rect x="3" y="11" width="18" height="2"></rect>
        <rect x="3" y="16" width="18" height="2"></rect>
      </svg>
    </button>
    <nav class="site-nav" id="site-nav" aria-label="Main">
      <ul class="nav-list">
        {{ range site.Menus.main }}
          {{ if .HasChildren }}
            <li class="nav-item has-children">
              <div class="nav-item-row">
                <a class="nav-link" href="{{ .URL }}">{{ .Name }}</a>
                <button class="submenu-toggle" type="button" aria-expanded="false" aria-label="Toggle {{ .Name }} submenu">
                  <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                    <path d="M7 10l5 5 5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                  </svg>
                </button>
              </div>
              <ul class="nav-submenu">
                {{ range .Children }}
                  <li class="nav-subitem">
                    <a class="nav-sublink" href="{{ .URL }}">{{ .Name }}</a>
                  </li>
                {{ end }}
              </ul>
            </li>
          {{ else }}
            <li class="nav-item">
              <a class="nav-link" href="{{ .URL }}">{{ .Name }}</a>
            </li>
          {{ end }}
        {{ end }}
        <li class="nav-item nav-icon">
          <a class="nav-link" href="mailto:{{ site.Params.email }}" aria-label="Email">
            <img src="/icons/mail-36x36.png" alt="Email" />
          </a>
        </li>
        <li class="nav-item nav-icon">
          <a class="nav-link" href="{{ site.Params.github }}" target="_blank" rel="noopener" aria-label="GitHub">
            <img src="/icons/github-1-36x36.png" alt="GitHub" />
          </a>
        </li>
        <li class="nav-item nav-icon">
          <a class="nav-link" href="{{ site.Params.linkedin }}" target="_blank" rel="noopener" aria-label="LinkedIn">
            <img src="/icons/linkedin-36x36.png" alt="LinkedIn" />
          </a>
        </li>
        <li class="nav-item nav-icon">
          <a class="nav-link" href="{{ site.Params.scholar }}" target="_blank" rel="noopener" aria-label="Google Scholar">
            <img src="/icons/gscholar1-36x36.png" alt="Google Scholar" />
          </a>
        </li>
      </ul>
    </nav>
  </div>
</header>
