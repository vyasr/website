<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found — {{ site.Title }}</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Slab:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    {{ partial "site-header.html" . }}
    <main class="site-main">
      <section class="content">
        <h1 class="page-title">Page Not Found</h1>
        <p>The page you are looking for does not exist. Try heading back to the homepage.</p>
        <p><a href="/">Return to the homepage</a></p>
      </section>
    </main>
    {{ partial "site-footer.html" . }}
  </body>
</html>
